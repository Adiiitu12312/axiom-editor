name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Typecheck
      run: npx tsc --noEmit

    - name: Run Linter
      run: npx eslint src

    - name: Build Package
      run: npm run build

    - name: Verify Bundle Loading
      run: node -e "require('./dist/axiom-editor.cjs')"
 
 